# Self-hosted stack for Claudia. Phase 0 runs just the gateway; STT/TTS/LLM/db services
# are declared (commented) as the target topology and enabled in later phases.
services:
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CLAUDIA_ENV=dev
    # depends_on: [redis, postgres]

