name: Android Release

# Tag-driven signed Android release. Builds the kiosk APK (MDM/sideload) and the consumer
# AAB (Play), signs with the upload key, attaches the APK to the GitHub Release, and (when a
# Play service account is configured) uploads the AAB to Play internal testing via fastlane.
# All signing/Play credentials come from GitHub Actions secrets — never the repo.
#
# Required secrets:
#   ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD
# Play upload is KEYLESS via Workload Identity Federation (the org blocks service-account
# keys — iam.disableServiceAccountKeyCreation). Set these repo VARIABLES to enable it:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  projects/N/locations/global/workloadIdentityPools/POOL/providers/PROV
#   GCP_PLAY_PUBLISHER_SA           play-publisher@PROJECT.iam.gserviceaccount.com
# Optional repo variable: CLAUDIA_URL (the WebView backend baked into the app).
# See docs/ANDROID_RELEASE.md for the one-time GCP + Play setup.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v1.4.2)"
        required: true

permissions:
  contents: write   # attach the APK to the GitHub Release
  id-token: write   # mint the OIDC token for keyless Google auth (WIF)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          python tools/android_version.py "$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore & validate upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          KS="$RUNNER_TEMP/upload.keystore"
          # Strip any wrapping/whitespace, then decode exactly once.
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$KS" || {
            echo "::error::ANDROID_KEYSTORE_BASE64 failed to base64-decode."; exit 1; }
          if [ ! -s "$KS" ]; then echo "::error::decoded keystore is empty."; exit 1; fi
          # Catch a double-encoded secret: a real keystore is binary, not ASCII text.
          if LC_ALL=C grep -qI . "$KS"; then
            echo "::error::Decoded file looks like text, not a keystore — ANDROID_KEYSTORE_BASE64 is"
            echo "  probably double base64-encoded. Regenerate it from the .jks (see below) and re-set it."
            echo "  Linux:  base64 -w0 upload.jks | gh secret set ANDROID_KEYSTORE_BASE64 --repo ivancrneto/claudia"
            echo "  macOS:  base64 -i upload.jks | tr -d '\\n' | gh secret set ANDROID_KEYSTORE_BASE64 --repo ivancrneto/claudia"
            exit 1
          fi
          # Validate it loads with the given password before the (long) build.
          if ! keytool -list -keystore "$KS" -storepass "$ANDROID_KEYSTORE_PASSWORD" >/dev/null 2>/tmp/kt.err; then
            echo "::error::Keystore failed to load — check ANDROID_KEYSTORE_BASE64 and ANDROID_KEYSTORE_PASSWORD."
            sed -E 's/[A-Za-z0-9+/]{16,}/<redacted>/g' /tmp/kt.err || true
            exit 1
          fi
          echo "CLAUDIA_UPLOAD_STORE_FILE=$KS" >> "$GITHUB_ENV"

      - name: Build kiosk APK + consumer AAB (signed)
        working-directory: apps/mobile/android
        env:
          CLAUDIA_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          CLAUDIA_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          CLAUDIA_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          CLAUDIA_URL: ${{ vars.CLAUDIA_URL || 'https://claudia.example.com/' }}
        run: |
          gradle :app:assembleKioskRelease :app:bundleConsumerRelease \
            -PclaudiaUrl="$CLAUDIA_URL" \
            -PversionName=${{ steps.version.outputs.VERSION_NAME }} \
            -PversionCode=${{ steps.version.outputs.VERSION_CODE }} \
            --no-daemon --stacktrace

      - name: Collect artifacts
        working-directory: apps/mobile/android
        run: |
          V="${{ steps.version.outputs.VERSION_NAME }}"
          mkdir -p "$RUNNER_TEMP/out"
          cp app/build/outputs/apk/kiosk/release/app-kiosk-release.apk "$RUNNER_TEMP/out/claudia-$V-kiosk.apk"
          cp app/build/outputs/bundle/consumerRelease/app-consumer-release.aab "$RUNNER_TEMP/out/claudia-$V-consumer.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: claudia-android-${{ steps.version.outputs.VERSION_NAME }}
          path: ${{ runner.temp }}/out/*

      # Attach the kiosk APK (MDM/sideload) AND the consumer AAB (for manual Play upload
      # when keyless WIF isn't configured) to the GitHub Release. Tag pushes only.
      - name: Attach APK + AAB to the GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/out/claudia-*-kiosk.apk
            ${{ runner.temp }}/out/claudia-*-consumer.aab

      # --- Keyless Play upload via Workload Identity Federation ---
      # No service-account key (the org blocks key creation). GitHub mints an OIDC token,
      # google-github-actions/auth exchanges it via GCP STS to impersonate the publisher SA
      # and writes ADC creds; fastlane supply (>= 2.230) picks them up automatically. Runs
      # only when the WIF repo variables are set.
      - name: Authenticate to Google Cloud (keyless WIF)
        if: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_PLAY_PUBLISHER_SA }}

      - name: Upload consumer AAB to Play (internal)
        if: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
        working-directory: apps/mobile/android
        env:
          CONSUMER_AAB_PATH: ${{ runner.temp }}/out/claudia-${{ steps.version.outputs.VERSION_NAME }}-consumer.aab
        run: |
          gem install --no-document fastlane   # uses ADC from the auth step (no key)
          fastlane internal
