name: Android Release

# Tag-driven release. All signing/Play credentials come from GitHub Actions secrets
# (encrypted, never in the repo). See docs/ANDROID_RELEASE.md for the required secret names.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v1.4.2)"
        required: true

defaults:
  run:
    working-directory: apps/mobile/android

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        working-directory: .
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          python tools/android_version.py "$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      # Decode the upload keystore from a base64 secret to a path OUTSIDE the repo.
      - name: Restore upload keystore
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          echo "$UPLOAD_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.keystore"
          echo "CLAUDIA_UPLOAD_STORE_FILE=$RUNNER_TEMP/upload.keystore" >> "$GITHUB_ENV"

      - name: Build kiosk APK (MDM / sideload)
        env:
          CLAUDIA_UPLOAD_STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
          CLAUDIA_UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          CLAUDIA_UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleKioskRelease \
            -PversionName=${{ steps.version.outputs.VERSION_NAME }} \
            -PversionCode=${{ steps.version.outputs.VERSION_CODE }}

      - name: Build consumer AAB (Play)
        env:
          CLAUDIA_UPLOAD_STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
          CLAUDIA_UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          CLAUDIA_UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          ./gradlew :app:bundleConsumerRelease \
            -PversionName=${{ steps.version.outputs.VERSION_NAME }} \
            -PversionCode=${{ steps.version.outputs.VERSION_CODE }}

      # Kiosk APK → GitHub Release asset for MDM/sideload distribution.
      - name: Publish kiosk APK to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/android/app/build/outputs/apk/kiosk/release/*.apk

      # Consumer AAB → Play internal track via fastlane (Play App Signing).
      - name: Restore Play service account
        env:
          PLAY_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON_B64" | base64 -d > "$RUNNER_TEMP/play.json"
          echo "PLAY_SERVICE_ACCOUNT_JSON=$RUNNER_TEMP/play.json" >> "$GITHUB_ENV"

      - name: Upload consumer AAB to Play (internal)
        env:
          CONSUMER_AAB_PATH: apps/mobile/android/app/build/outputs/bundle/consumerRelease/app-consumer-release.aab
        run: |
          gem install fastlane --no-document
          fastlane internal
