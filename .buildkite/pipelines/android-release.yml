# Signed Android release for Claudia. Builds the kiosk APK (MDM/sideload) and the consumer
# AAB (Play), signs with the upload key from Buildkite CLUSTER secrets, and — when a Play
# service account is configured — uploads the AAB to Play internal testing via fastlane.
# Triggered from .buildkite/pipeline.yml on a v* tag or a manual BUILD_ANDROID=true build.
#
# Required Buildkite CLUSTER secrets (same names as izap):
#   ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD
# Optional (enables the Play upload):
#   PLAY_SERVICE_ACCOUNT_JSON_B64
# Config (build env): CLAUDIA_URL — backend the WebView loads, baked into the app.
# See docs/ANDROID_RELEASE.md for the full setup.
steps:
  - block: ":android: Release Claudia Android?"
    key: "approve-android"
    prompt: "Build & publish Claudia Android for ${BUILDKITE_TAG:-this build}?"
    # Auto-skip only when explicitly pre-approved. NATIVE_RELEASE_PREAPPROVED is a plain env
    # any build could set, so for a real gate pin it to a trusted creator like izap does
    # (build.creator.email). Failure mode is safe: unset => the block is shown, never skipped.
    if: 'build.env("NATIVE_RELEASE_PREAPPROVED") != "true"'

  - label: ":android: Build & sign Claudia APK + AAB (+ optional Play internal)"
    key: "build-android"
    depends_on: "approve-android"
    timeout_in_minutes: 45
    cancel_on_build_failing: true
    command: bash .buildkite/steps/builds/build_android
    env:
      CLAUDIA_URL: "${CLAUDIA_URL:-https://claudia.example.com/}"
    agents:
      queue: "default"
    artifact_paths:
      - "claudia-*.apk"
      - "claudia-*.aab"
    retry:
      automatic:
        - exit_status: -1   # agent lost
          limit: 2
        - exit_status: 125  # docker create/start failure
          limit: 1
